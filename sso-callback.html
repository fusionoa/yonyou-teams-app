<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <title>SSO 登入中...</title>
  <script src="https://res.cdn.office.net/teams-js/2.30.0/MicrosoftTeams.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #f3f4f6; 
      font-family: 'Segoe UI', Arial, sans-serif; 
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e5e7eb;
      border-top-color: #0078d4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { font-size: 15px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p class="msg" id="msg">正在完成 SSO 登入...</p>

  <script>
    async function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const error = params.get('error');
      const yonyouSid = params.get('yonyou_sid'); // Our custom param if YonSuite sets it

      // Check if we're still on the SSO flow (has SAMLResponse or RelayState)
      const hasSAMLResponse = params.has('SAMLResponse') || 
        window.location.href.includes('SAMLResponse');

      if (error) {
        document.getElementById('msg').textContent = '登入失敗：' + decodeURIComponent(error);
        await notifyFailure('SSO error: ' + error);
        return;
      }

      if (hasSAMLResponse) {
        // We're at the SAML POST page - form should auto-submit
        // Wait for the form to submit and come back to our callback URL
        document.getElementById('msg').textContent = '正在完成驗證...';
        
        // Intercept the form submission to add our callback param
        const form = document.querySelector('form');
        if (form) {
          // Add RelayState to point back to our callback
          const relayInput = form.querySelector('input[name="RelayState"]');
          if (relayInput && !relayInput.value.includes('sso-callback')) {
            relayInput.value = window.location.origin + '/teams/sso-callback.html?sso=success';
          }
          // Let the form submit naturally
          document.getElementById('msg').textContent = '正在完成驗證，請稍候...';
        }
        return;
      }

      // Check if URL indicates successful SAML flow returned
      const urlParams = new URLSearchParams(window.location.search);
      const relayState = urlParams.get('RelayState') || '';
      const ticket = urlParams.get('ticket') || '';

      // If we have a ticket, the SAML flow succeeded
      if (ticket || relayState.includes('sso-success') || urlParams.get('sso') === 'success') {
        await notifySuccess();
        return;
      }

      // Still on the SSO login page - wait for user interaction
      document.getElementById('msg').textContent = '請在彈窗中完成登入...';

      // Set up a MutationObserver to detect when the form submits
      // (SAML form auto-submits after Microsoft login)
      const observer = new MutationObserver(() => {
        if (document.querySelector('form') === null || 
            window.location.search.includes('SAMLResponse')) {
          // Form submitted, reload to process
          window.location.reload();
        }
      });
      
      observer.observe(document.body, { childList: true, subtree: true });

      // Also check for page changes every second
      let lastHref = window.location.href;
      const interval = setInterval(() => {
        if (window.location.href !== lastHref) {
          clearInterval(interval);
          handleCallback();
        }
      }, 1000);
    }

    async function notifySuccess() {
      document.getElementById('msg').textContent = '✅ 登入成功！正在關閉視窗...';
      document.body.innerHTML += '<p style="color:#16a34a;margin-top:16px;font-size:14px;">✓ 成功</p>';
      
      try {
        await microsoftTeams.app.initialize();
        microsoftTeams.authentication.notifySuccess('sso_complete');
      } catch(e) {
        // Not in Teams - redirect to main page
        setTimeout(() => {
          window.location.href = window.location.origin + '/teams/?sso=success';
        }, 1000);
      }
    }

    async function notifyFailure(reason) {
      document.getElementById('msg').textContent = '❌ ' + (reason || '登入失敗');
      
      try {
        await microsoftTeams.app.initialize();
        microsoftTeams.authentication.notifyFailure(reason || 'unknown_error');
      } catch(e) {
        // Not in Teams - redirect to main page
        setTimeout(() => {
          window.location.href = window.location.origin + '/teams/?error=' + encodeURIComponent(reason);
        }, 2000);
      }
    }

    // Initialize
    handleCallback();
  </script>
</body>
</html>
