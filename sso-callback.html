<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <title>SSO 登入中...</title>
  <script src="https://res.cdn.office.net/teams-js/2.30.0/MicrosoftTeams.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #f3f4f6; 
      font-family: 'Segoe UI', Arial, sans-serif; 
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e5e7eb;
      border-top-color: #0078d4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { font-size: 15px; color: #6b7280; max-width: 300px; text-align: center; line-height: 1.5; }
    .success { color: #16a34a; }
    .error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <p class="msg" id="msg">正在處理登入...</p>

  <script>
    async function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const hash = window.location.hash; // AngularJS hash route
      const msgEl = document.getElementById('msg');
      const spinnerEl = document.getElementById('spinner');

      // Check for various success indicators from YonSuite SSO
      const error = params.get('error');
      const token = params.get('token') || params.get('access_token') || params.get('sid');
      const code = params.get('code');
      const ticket = params.get('ticket');

      // Check hash for AngularJS route state (e.g. #/home, #/dashboard)
      const isHomeRoute = hash.includes('/home') || hash.includes('/dashboard') || 
                          hash.includes('/main') || hash === '' && params.toString() === '';

      // If redirected back from YonSuite after login, we might be on the login page with a session
      // Check if we're successfully logged in (YonSuite sets cookies)
      if (error) {
        msgEl.textContent = '❌ 登入失敗：' + decodeURIComponent(error);
        msgEl.className = 'msg error';
        spinnerEl.style.display = 'none';
        await notifyFailure('SSO error: ' + error);
        return;
      }

      // Check if URL indicates we're still on YonSuite SPA (has hash route)
      if (hash && hash !== '' && !hash.includes('ssologin')) {
        // We're on an app route - SSO likely succeeded!
        spinnerEl.style.display = 'none';
        msgEl.innerHTML = '✅ 登入成功！<br><br>正在關閉視窗...';
        msgEl.className = 'msg success';
        await notifySuccess();
        return;
      }

      // Check for token/code/ticket in URL
      if (token || code || ticket) {
        spinnerEl.style.display = 'none';
        msgEl.innerHTML = '✅ 驗證完成！<br><br>正在關閉視窗...';
        msgEl.className = 'msg success';
        await notifySuccess();
        return;
      }

      // Still on login page - wait for user to interact
      spinnerEl.style.display = 'none';
      msgEl.innerHTML = '請在視窗中完成登入...<br><br><span style="font-size:12px;color:#9ca3af;">如果已填寫資訊，請點擊「確定」</span>';
      
      // Set up interval to check for URL/hash changes
      const originalHash = window.location.hash;
      const originalHref = window.location.href;
      let countdown = 60;
      const countdownEl = document.createElement('p');
      countdownEl.style.cssText = 'font-size:12px;color:#9ca3af;margin-top:16px;';
      msgEl.after(countdownEl);

      const interval = setInterval(() => {
        countdown--;
        countdownEl.textContent = `等待中... (${countdown}s)`;
        
        if (window.location.href !== originalHref || window.location.hash !== originalHash) {
          clearInterval(interval);
          handleCallback();
        }
        if (countdown <= 0) {
          clearInterval(interval);
          // Timeout - assume success if we're not on login page
          if (window.location.hash.includes('/home') || window.location.hash.includes('/dashboard')) {
            notifySuccess();
          } else {
            msgEl.textContent = '等待超時，請重試';
            msgEl.className = 'msg error';
            notifyFailure('timeout');
          }
        }
      }, 1000);
    }

    async function notifySuccess() {
      try {
        await microsoftTeams.app.initialize();
        microsoftTeams.authentication.notifySuccess('sso_complete');
      } catch(e) {
        // Not in Teams - redirect to main page
        setTimeout(() => {
          window.location.href = window.location.origin + '/teams/?sso=success';
        }, 1000);
      }
    }

    async function notifyFailure(reason) {
      try {
        await microsoftTeams.app.initialize();
        microsoftTeams.authentication.notifyFailure(reason || 'unknown_error');
      } catch(e) {
        setTimeout(() => {
          window.location.href = window.location.origin + '/teams/?error=' + encodeURIComponent(reason);
        }, 2000);
      }
    }

    // Add a manual "Done" button in case auto-detection fails
    document.body.innerHTML += `
      <button onclick="handleCallback()" style="
        margin-top: 24px;
        padding: 8px 24px;
        background: #0078d4;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      ">已完成登入，點擊這裡</button>
    `;

    handleCallback();
  </script>
</body>
</html>
