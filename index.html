<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Yonyou Cloud — Microsoft Teams</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #f3f4f6; 
      font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif; 
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .panel {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 48px 40px;
      text-align: center;
      max-width: 440px;
      width: 90%;
    }
    
    .logo {
      width: 64px; height: 64px;
      margin: 0 auto 24px;
    }
    
    h1 { font-size: 22px; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 32px; line-height: 1.6; }
    
    .sso-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #0078d4;
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
      justify-content: center;
    }
    .sso-btn:hover { background: #005a9e; }
    
    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="panel">
  <svg class="logo" viewBox="0 0 64 64" fill="none">
    <rect width="64" height="64" rx="14" fill="#0078d4"/>
    <path d="M18 20h28c2.2 0 4 1.8 4 4v16c0 2.2-1.8 4-4 4H18c-2.2 0-4-1.8-4-4V24c0-2.2 1.8-4 4-4z" fill="white" opacity="0.9"/>
    <path d="M24 28h16M24 34h10" stroke="#0078d4" stroke-width="2" stroke-linecap="round"/>
  </svg>

  <h1>Yonyou Cloud</h1>
  <p class="subtitle">使用 Microsoft 365 帳戶<br>安全登入用友雲端</p>

  <button class="sso-btn" onclick="startSSO()">
    <svg width="20" height="20" viewBox="0 0 21 21" fill="none">
      <rect x="1" y="1" width="9" height="9" fill="#F25022"/>
      <rect x="11" y="1" width="9" height="9" fill="#7FBA00"/>
      <rect x="1" y="11" width="9" height="9" fill="#00A4EF"/>
      <rect x="11" y="11" width="9" height="9" fill="#FFB900"/>
    </svg>
    使用 M365 帳戶 SSO 登入
  </button>

  <p class="note">
    點擊後將通過 Microsoft Azure AD 安全驗證<br>
    使用你已登入的 Teams 帳戶自動完成登入
  </p>
</div>

<script>
function startSSO() {
  // Redirect the entire Teams Tab to the SSO entry point
  // proxied through our domain to avoid iframe restrictions
  const ssoUrl = window.location.origin + '/yonyou-sso/cas/thirdSaml2Login?thirdUCId=u10pzze8&service=' + 
    encodeURIComponent(window.location.origin + '/yonyou-app/login?tenantId=w5f0xnbi');
  
  window.location.href = ssoUrl;
}
</script>

</body>
</html>
