<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yonyou Cloud</title>
  <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>
</head>
<body style="margin:0;padding:40px;font-family:'Segoe UI',sans-serif;text-align:center;background:#f5f5f5;">
  <div style="color:#666;">
    <p style="font-size:18px;margin-bottom:12px;">⏳ Opening Yonyou Cloud...</p>
    <p style="font-size:13px;color:#999;">If not redirected automatically, click the button below.</p>
    <a href="https://c2.yonyoucloud.com/" target="_blank"
       style="display:inline-block;margin-top:20px;padding:10px 24px;background:#E8450F;color:#fff;text-decoration:none;border-radius:6px;font-size:14px;">
      Open Yonyou Cloud →
    </a>
  </div>
  <script>
    // Initialize Teams context
    try {
      if (typeof microsoftTeams !== 'undefined') {
        microsoftTeams.initialize();
        microsoftTeams.appInitialization.notifySuccess();
      }
    } catch(e) {}

    // Open URL in external browser after a short delay
    setTimeout(function() {
      try {
        // Try Teams deep link to open in browser
        microsoftTeams.executeDeepLink("https://c2.yonyoucloud.com/");
      } catch(e) {
        // Fallback: just redirect
        window.location.href = "https://c2.yonyoucloud.com/";
      }
    }, 1500);
  </script>
</body>
</html>
