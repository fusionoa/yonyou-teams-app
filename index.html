<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用友雲</title>
  <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #f5f5f5; font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
    }
    #loading .spinner {
      width: 40px; height: 40px; border: 4px solid #e0e0e0;
      border-top-color: #E8450F; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading p { margin-top: 16px; color: #666; font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    iframe {
      width: 100%; height: 100%; border: none;
    }
  </style>
</head>
<body>
  <!-- Loading screen while Teams initializes -->
  <div id="loading">
    <div class="spinner"></div>
    <p>正在載入用友雲...</p>
  </div>

  <!-- Iframe for Yonyou Cloud -->
  <iframe id="yonyou-frame" src="https://c2.yonyoucloud.com/" 
          sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-top-navigation"
          allow="clipboard-read; clipboard-write">
  </iframe>

  <script>
    // Initialize Microsoft Teams context
    microsoftTeams.initialize();
    microsoftTeams.appInitialization.notifySuccess();
    microsoftTeams.navigation.notifySuccess();

    // Hide loading screen once iframe is ready
    const frame = document.getElementById('yonyou-frame');
    const loading = document.getElementById('loading');

    frame.addEventListener('load', function() {
      loading.style.display = 'none';
    });

    // Fallback: hide loading after 5 seconds anyway
    setTimeout(function() {
      loading.style.display = 'none';
    }, 5000);

    // Handle Teams theme
    microsoftTeams.getContext(function(context) {
      // Optional: match Teams theme
      if (context.theme === 'dark') {
        document.body.style.background = '#1f1f1f';
        document.querySelector('#loading p').style.color = '#ccc';
      }
    });
  </script>
</body>
</html>
