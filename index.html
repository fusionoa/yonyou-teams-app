<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Yonyou Cloud</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #fff; font-family: "Segoe UI", sans-serif;
      -webkit-overflow-scrolling: touch;
    }

    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #f8f9fa, #e9ecef); z-index: 10;
      transition: opacity 0.5s ease;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    .spinner {
      width: 44px; height: 44px; border: 4px solid #dee2e6;
      border-top-color: #E8450F; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #495057; font-size: 15px; font-weight: 500; }
    .loading-sub { color: #868e96; font-size: 12px; margin-top: 6px; }

    /* 外層滾動容器 */
    #scroll-wrapper {
      width: 100%;
      height: 100%;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* iframe 以 1440x900 渲染，透過 transform 縮放 */
    #frame-scaler {
      width: 1440px;
      height: 900px;
      transform-origin: top left;
      transform: scale(var(--s, 1));
    }

    iframe {
      width: 1440px;
      height: 900px;
      border: none;
      display: block;
    }

    #mobile-hint {
      display: none;
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(232,69,15,0.9);
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 11px;
      z-index: 5;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">正在載入用友雲...</div>
    <div class="loading-sub">Loading Yonyou Cloud</div>
  </div>

  <div id="scroll-wrapper">
    <div id="frame-scaler">
      <iframe id="yonyou" src="https://c2.yonyoucloud.com/" allow="clipboard-read; clipboard-write"></iframe>
    </div>
  </div>

  <div id="mobile-hint">👆 雙指縮放 / 雙擊放大</div>

  <script>
    var loading = document.getElementById('loading');
    var mobileHint = document.getElementById('mobile-hint');

    // 計算縮放比例：讓 1440 寬度適配螢幕，用友雲以桌面模式渲染
    function adjustScale() {
      var w = window.innerWidth;
      var h = window.innerHeight;
      var scaleX = w / 1440;
      var scaleY = h / 900;
      var scale = Math.min(scaleX, scaleY, 1); // 不放大，只縮小

      var scaler = document.getElementById('frame-scaler');
      scaler.style.transform = 'scale(' + scale + ')';
      scaler.style.width = (1440 * scale) + 'px';
      scaler.style.height = (900 * scale) + 'px';

      // 設定實際滾動區域為桌面尺寸
      var wrapper = document.getElementById('scroll-wrapper');
      wrapper.style.width = (1440 * scale) + 'px';
      wrapper.style.height = (900 * scale) + 'px';
    }

    document.getElementById('yonyou').addEventListener('load', function() {
      setTimeout(function() {
        loading.classList.add('fade-out');
        setTimeout(function() { loading.style.display = 'none'; }, 500);
      }, 800);
    });

    (function initTeams() {
      try {
        if (typeof microsoftTeams !== 'undefined') {
          microsoftTeams.initialize(function() {
            console.log('Teams initialized');
            microsoftTeams.appInitialization.notifySuccess();
          });
          microsoftTeams.settings.setValidityState(true);
          microsoftTeams.registerOnThemeChangeHandler(function(theme) {
            document.body.style.backgroundColor = theme === 'dark' ? '#1f1f1f' : '#fff';
          });
        }
      } catch(e) {
        console.log('Teams SDK not available:', e.message);
      }
    })();

    setTimeout(function() {
      loading.classList.add('fade-out');
      setTimeout(function() { loading.style.display = 'none'; }, 500);
    }, 15000);

    window.addEventListener('resize', adjustScale);
    window.addEventListener('orientationchange', function() { setTimeout(adjustScale, 300); });
    adjustScale();

    if (/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)) {
      mobileHint.style.display = 'block';
      setTimeout(function() {
        mobileHint.style.opacity = '0';
        mobileHint.style.transition = 'opacity 0.5s';
        setTimeout(function() { mobileHint.style.display = 'none'; }, 500);
      }, 4000);
    }
  </script>

  <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>
</body>
</html>
